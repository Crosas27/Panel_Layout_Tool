<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Layout Tool</title>

<style>

body{
    font-family: system-ui, sans-serif;
    background:#0f172a;
    color:#e2e8f0;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.controls{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.control-group{
    display:flex;
    flex-direction:column;
    font-size:14px;
}

input{
    padding:6px 8px;
    border-radius:4px;
    border:1px solid #334155;
    background:#020617;
    color:#e2e8f0;
}

button{
    padding:8px 16px;
    background:#0284c7;
    border:none;
    border-radius:4px;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0369a1;
}

#wallSvg{
    width:100%;
    height:260px;
    border:1px solid #334155;
    background:#020617;
}

</style>

</head>

<body>

<h1>Panel Layout Tool</h1>

<div class="controls">

    <div class="control-group">
        <label>Wall Width (inches)</label>
        <input id="wallWidth" type="number" placeholder="Example: 144">
    </div>

    <div class="control-group">
        <label>Starting Offset (inches)</label>
        <input id="offset" type="number" placeholder="Example: 0">
    </div>

    <div class="control-group">
        <label>&nbsp;</label>
        <button id="renderBtn">Generate Layout</button>
    </div>

</div>

<svg id="wallSvg"></svg>

<script type="module" src="./src/app.js"></script>

</body>
</html>
